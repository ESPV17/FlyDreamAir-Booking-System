<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Booking — FlyDreamAir</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="app-main">
    <header class="page-header">
      <div class="container" style="position:relative">
        <div class="flex flex-between flex-wrap gap-md">
          <div>
            <p style="color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:0.08em;font-size:0.8rem;font-weight:600" id="ref-line">Manage booking</p>
            <h1 id="route-h1">— → —</h1>
            <p id="date-line"></p>
          </div>
          <div class="flex gap-sm">
            <a href="reservations.html" class="btn btn-ghost btn-sm">← Back to bookings</a>
          </div>
        </div>
      </div>
    </header>

    <section class="section-sm">
      <div class="container">
        <div id="cancelled-banner" class="alert alert-danger hidden">
          <strong>This booking is cancelled.</strong> You can view the details but no changes can be saved.
        </div>

        <div class="search-tabs" style="margin-bottom:var(--gap-lg);flex-wrap:wrap" id="tab-bar"></div>

        <div class="grid-2" style="grid-template-columns:minmax(0,1fr) 360px">
          <div id="tab-content"></div>
          <div class="side-panel" id="sidebar" style="position:sticky;top:calc(var(--nav-height) + var(--gap-md));align-self:start"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="main.js"></script>
  <script>
    mountChrome('reservations');

    // ── Load reservation by URL ?id= ───────────────────────────
    const urlId = new URLSearchParams(window.location.search).get('id');
    let reservation = urlId ? getReservation(urlId) : null;
    if (!reservation) {
      showToast(`Booking ${urlId || ''} not found`, 'error');
      setTimeout(() => window.location.href = 'reservations.html', 600);
    }

    // ── Constants ──────────────────────────────────────────────
    const FIRST_ROWS    = [1, 2];
    const BUSINESS_ROWS = [3, 4, 5, 6];
    const ECONOMY_ROWS  = Array.from({ length: 20 }, (_, i) => 7 + i);
    const COLS_6 = ['A','B','C','D','E','F'];
    const COLS_4 = ['A','B','E','F'];
    const TABS = [
      { key: 'overview',   label: 'Overview' },
      { key: 'passengers', label: 'Passengers' },
      { key: 'seats',      label: 'Seats' },
      { key: 'addons',     label: 'Add-ons' },
      { key: 'flight',     label: 'Change Flight' },
    ];

    function seatPrice(seatId) {
      if (!seatId) return 0;
      const row = parseInt(seatId, 10);
      if (FIRST_ROWS.includes(row)) return 80;
      if (BUSINESS_ROWS.includes(row)) return 40;
      return 15;
    }

    function generateTaken(flightId) {
      const taken = new Set();
      let h = 0;
      const id = flightId || 'X';
      for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
      const rand = () => { h = (h * 1103515245 + 12345) & 0x7fffffff; return h / 0x7fffffff; };
      const allRows = [...FIRST_ROWS, ...BUSINESS_ROWS, ...ECONOMY_ROWS];
      for (let i = 0; i < 50; i++) {
        const row = allRows[Math.floor(rand() * allRows.length)];
        const cols = FIRST_ROWS.includes(row) ? COLS_4 : COLS_6;
        const col = cols[Math.floor(rand() * cols.length)];
        taken.add(`${row}${col}`);
      }
      return taken;
    }

    function splitName(full) {
      const parts = (full || '').trim().split(/\s+/);
      return { first: parts[0] || '', last: parts.slice(1).join(' ') || '' };
    }

    function joinName(title, first, last) {
      return [title, first, last].filter(Boolean).join(' ').trim();
    }

    function buildDraft(res) {
      const flight = FDA.flights.find(f => f.id === res.flight) || {
        id: res.flight, from: res.from, fromCity: res.fromCity,
        to: res.to, toCity: res.toCity, date: res.date,
        depart: res.depart, arrive: res.arrive, duration: '—', stops: 0,
        price: Math.round(res.total / Math.max(res.passengers.length, 1)),
      };
      return {
        flightId: flight.id,
        tripType: res.tripType || 'R',
        contactEmail: res.contactEmail || '',
        contactPhone: res.contactPhone || '',
        passengers: res.passengers.map(p => {
          const { first, last } = splitName(p.name);
          return {
            title:    p.title    || 'Mr',
            firstName: p.firstName || first,
            lastName:  p.lastName  || last,
            dob:      p.dob      || '',
            ffNumber: p.ffNumber || '',
            specialMeal: p.specialMeal || '',
            assistance: p.assistance || '',
            seat:     p.seat || null,
          };
        }),
        services: res.services || {},
        extras: res.extras || {},
      };
    }

    function getFlight() {
      return FDA.flights.find(f => f.id === draft.flightId) || {
        id: draft.flightId,
        from: reservation.from, fromCity: reservation.fromCity,
        to:   reservation.to,   toCity:   reservation.toCity,
        date: reservation.date, depart: reservation.depart, arrive: reservation.arrive,
        duration: '—', stops: 0,
        price: Math.round(reservation.total / Math.max(reservation.passengers.length, 1)),
      };
    }

    function calcTotal() {
      const flight = getFlight();
      const flightTotal = (flight.price || 0) * draft.passengers.length;
      const seatTotal = draft.passengers.reduce((s, p) => s + seatPrice(p.seat), 0);
      const addonsTotal = draft.passengers.reduce((sum, _, i) => {
        const picks = draft.services?.[i] || {};
        return sum + Object.values(picks).reduce((a, sid) => {
          const svc = FDA.services.find(x => x.id === sid);
          return a + (svc ? svc.price : 0);
        }, 0);
      }, 0);
      const extrasTotal = FDA.tripExtras.reduce(
        (s, e) => s + (draft.extras?.[e.id] ? e.price * draft.passengers.length : 0), 0
      );
      return { flightTotal, seatTotal, addonsTotal, extrasTotal,
               total: flightTotal + seatTotal + addonsTotal + extrasTotal };
    }

    // ── State ─────────────────────────────────────────────────
    let draft = buildDraft(reservation);
    let tab = 'overview';
    let activeSeatPax = 0;
    const isCancelled = reservation.status === 'cancelled';

    // ── Header ────────────────────────────────────────────────
    function renderHeader() {
      const flight = getFlight();
      document.getElementById('ref-line').textContent = `Manage booking · ${reservation.id}`;
      document.getElementById('route-h1').textContent = `${flight.fromCity} → ${flight.toCity}`;
      document.getElementById('date-line').textContent =
        `${formatDate(flight.date)} · departs ${flight.depart}${flight.arrive ? ' · arrives ' + flight.arrive : ''}`;
      document.getElementById('cancelled-banner').classList.toggle('hidden', !isCancelled);
    }

    // ── Tab bar ───────────────────────────────────────────────
    function renderTabs() {
      document.getElementById('tab-bar').innerHTML = TABS.map(t =>
        `<div class="search-tab ${tab === t.key ? 'active' : ''}" role="button" data-tab="${t.key}">${t.label}</div>`
      ).join('');
      document.querySelectorAll('#tab-bar .search-tab').forEach(el => {
        el.addEventListener('click', () => { tab = el.dataset.tab; renderAll(); });
      });
    }

    // ── Sidebar (sticky order summary) ────────────────────────
    function renderSidebar() {
      const flight = getFlight();
      const c = calcTotal();
      const diff = c.total - reservation.total;
      const diffLabel = diff > 0 ? 'To pay' : diff < 0 ? 'Refund' : 'No change';
      const diffColor = diff > 0 ? 'var(--danger)' : diff < 0 ? 'var(--success)' : 'var(--text-light)';
      const diffStr = diff === 0 ? '—' : (diff > 0 ? '+' : '−') + formatCurrency(Math.abs(diff));

      document.getElementById('sidebar').innerHTML = `
        <h3 style="margin-bottom:var(--gap-md)">Order summary</h3>
        <div class="summary-row">
          <span class="label">Flights (${draft.passengers.length} × ${formatCurrency(flight.price)})</span>
          <span class="value">${formatCurrency(c.flightTotal)}</span>
        </div>
        <div class="summary-row"><span class="label">Seats</span><span class="value">${formatCurrency(c.seatTotal)}</span></div>
        <div class="summary-row"><span class="label">Add-ons</span><span class="value">${formatCurrency(c.addonsTotal)}</span></div>
        <div class="summary-row"><span class="label">Trip extras</span><span class="value">${formatCurrency(c.extrasTotal)}</span></div>

        <div class="total-row"><span>New total</span><span>${formatCurrency(c.total)}</span></div>

        <div class="divider"></div>

        <div class="summary-row">
          <span class="label">Original total</span>
          <span class="value" style="color:var(--text-light)">${formatCurrency(reservation.total)}</span>
        </div>
        <div class="summary-row" style="border-bottom:none">
          <span class="label" style="font-weight:700">${diffLabel}</span>
          <span class="value" style="color:${diffColor};font-size:1.05rem">${diffStr}</span>
        </div>

        <div class="flex gap-sm mt-md flex-col">
          <button class="btn btn-primary btn-full" id="save-btn" ${isCancelled ? 'disabled' : ''}>Save changes</button>
          <button class="btn btn-secondary btn-full" id="discard-btn" ${isCancelled ? 'disabled' : ''}>Discard</button>
        </div>
      `;
      document.getElementById('save-btn').addEventListener('click', () => openSaveModal(diff, c.total));
      document.getElementById('discard-btn').addEventListener('click', () => {
        draft = buildDraft(reservation);
        renderAll();
        showToast('Changes discarded', 'info');
      });
    }

    // ── Tab: Overview ─────────────────────────────────────────
    function renderOverview() {
      const flight = getFlight();
      const daysUntil = Math.ceil((new Date(flight.date) - new Date()) / 86400000);
      const checkIn = daysUntil <= 1 ? 'Check-in is open' : `Check-in opens in ${daysUntil - 1} day${daysUntil - 1 === 1 ? '' : 's'}`;
      const statusBadgeClass = reservation.status === 'approved' ? 'badge-green' : reservation.status === 'cancelled' ? 'badge-red' : 'badge-grey';

      document.getElementById('tab-content').innerHTML = `
        <div class="card"><div class="card-body">
          <h3>Booking overview</h3>
          <div class="divider-teal"></div>
          <div class="grid-2" style="gap:var(--gap-md)">
            <div class="summary-row" style="border-bottom:none"><span class="label">Booking reference</span><span class="value">${reservation.id}</span></div>
            <div class="summary-row" style="border-bottom:none"><span class="label">Status</span><span class="value"><span class="badge ${statusBadgeClass}">${(reservation.status || 'pending').toUpperCase()}</span></span></div>
            <div class="summary-row" style="border-bottom:none"><span class="label">Flight</span><span class="value">${flight.id}</span></div>
            <div class="summary-row" style="border-bottom:none"><span class="label">Passengers</span><span class="value">${reservation.passengers.length}</span></div>
            <div class="summary-row" style="border-bottom:none"><span class="label">Original total</span><span class="value">${formatCurrency(reservation.total)}</span></div>
            <div class="summary-row" style="border-bottom:none"><span class="label">Check-in</span><span class="value">${checkIn}</span></div>
          </div>

          <div class="divider"></div>

          <h4>Trip type</h4>
          <p class="text-sm" style="color:var(--text-light);margin-bottom:var(--gap-sm)">Switching trip type may change applicable fare rules.</p>
          <div class="search-tabs">
            <div class="search-tab ${draft.tripType === 'R' ? 'active' : ''}" data-trip="R" role="button">Return</div>
            <div class="search-tab ${draft.tripType === 'OW' ? 'active' : ''}" data-trip="OW" role="button">One-way</div>
          </div>

          <div class="divider"></div>

          <div class="alert alert-warning"><div>
            <strong>Cancellation policy:</strong> Refunds vary by fare. Saver fares are non-refundable; Flex fares allow free changes up to 24 hours before departure.
          </div></div>

          <button class="btn btn-secondary mt-md" id="cancel-booking-btn" style="color:var(--danger);border-color:var(--danger)" ${isCancelled ? 'disabled' : ''}>Cancel this booking</button>
        </div></div>
      `;
      document.querySelectorAll('#tab-content .search-tab').forEach(t => {
        t.addEventListener('click', () => {
          if (isCancelled) return;
          draft.tripType = t.dataset.trip;
          renderOverview();
          renderSidebar();
        });
      });
      document.getElementById('cancel-booking-btn').addEventListener('click', openCancelModal);
    }

    // ── Tab: Passengers ───────────────────────────────────────
    function renderPassengers() {
      document.getElementById('tab-content').innerHTML = `
        <div class="card"><div class="card-body">
          <h3>Contact details</h3>
          <p class="text-sm" style="color:var(--text-light);margin-bottom:var(--gap-md)">We'll send updates and check-in reminders to this address.</p>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" id="contact-email" value="${escapeHtml(draft.contactEmail)}" placeholder="you@example.com" ${isCancelled ? 'disabled' : ''} />
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input class="form-control" type="tel" id="contact-phone" value="${escapeHtml(draft.contactPhone)}" placeholder="+61 4xx xxx xxx" ${isCancelled ? 'disabled' : ''} />
            </div>
          </div>

          <div class="divider"></div>

          <h3>Passenger details</h3>
          <p class="text-sm" style="color:var(--text-light);margin-bottom:var(--gap-md)">Names must match passport / government ID. Significant name changes may incur a fee.</p>

          ${draft.passengers.map((p, i) => `
            <div class="passenger-card mb-md">
              <h4>Passenger ${i + 1}</h4>
              <div class="form-row">
                <div class="form-group" style="max-width:110px">
                  <label class="form-label">Title</label>
                  <select class="form-control" data-pax="${i}" data-field="title" ${isCancelled ? 'disabled' : ''}>
                    ${['Mr','Ms','Mx','Mrs','Dr'].map(t => `<option ${p.title === t ? 'selected' : ''}>${t}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">First name</label>
                  <input class="form-control" data-pax="${i}" data-field="firstName" value="${escapeHtml(p.firstName)}" ${isCancelled ? 'disabled' : ''} />
                </div>
                <div class="form-group">
                  <label class="form-label">Last name</label>
                  <input class="form-control" data-pax="${i}" data-field="lastName" value="${escapeHtml(p.lastName)}" ${isCancelled ? 'disabled' : ''} />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Date of birth</label>
                  <input class="form-control" type="date" data-pax="${i}" data-field="dob" value="${escapeHtml(p.dob)}" ${isCancelled ? 'disabled' : ''} />
                </div>
                <div class="form-group">
                  <label class="form-label">Frequent flyer #</label>
                  <input class="form-control" data-pax="${i}" data-field="ffNumber" value="${escapeHtml(p.ffNumber)}" placeholder="FDA123456" ${isCancelled ? 'disabled' : ''} />
                </div>
                <div class="form-group">
                  <label class="form-label">Special meal</label>
                  <select class="form-control" data-pax="${i}" data-field="specialMeal" ${isCancelled ? 'disabled' : ''}>
                    ${FDA.specialMeals.map(m => `<option value="${escapeHtml(m)}" ${p.specialMeal === m ? 'selected' : ''}>${m || '— None —'}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Special assistance</label>
                <textarea class="form-control" rows="2" data-pax="${i}" data-field="assistance" placeholder="Wheelchair, mobility help, vision/hearing assistance, unaccompanied minor, etc." ${isCancelled ? 'disabled' : ''}>${escapeHtml(p.assistance)}</textarea>
              </div>
            </div>
          `).join('')}
        </div></div>
      `;

      document.getElementById('contact-email').addEventListener('input', e => { draft.contactEmail = e.target.value; });
      document.getElementById('contact-phone').addEventListener('input', e => { draft.contactPhone = e.target.value; });
      document.querySelectorAll('[data-pax][data-field]').forEach(el => {
        el.addEventListener('input',  () => { draft.passengers[el.dataset.pax][el.dataset.field] = el.value; });
        el.addEventListener('change', () => { draft.passengers[el.dataset.pax][el.dataset.field] = el.value; });
      });
    }

    // ── Tab: Seats ────────────────────────────────────────────
    function renderSeats() {
      const flight = getFlight();
      const taken = generateTaken(flight.id);
      const ownSeats = new Set(draft.passengers.map(p => p.seat).filter(Boolean));
      const originalSeats = new Set(reservation.passengers.map(p => p.seat).filter(Boolean));

      function seatBtn(row, col) {
        const id = `${row}${col}`;
        let cls = 'seat';
        const isOwn = ownSeats.has(id);
        const isTaken = taken.has(id) && !originalSeats.has(id);
        if (isTaken) cls += ' taken';
        else if (isOwn) cls += ' selected';
        return `<button class="${cls}" data-seat="${id}" ${isTaken || isCancelled ? 'disabled' : ''}>${col}</button>`;
      }

      function rowHtml(row, cols, isFirst) {
        const left = cols.slice(0, isFirst ? 2 : 3);
        const right = cols.slice(isFirst ? 2 : 3);
        return `<div class="seat-row${isFirst ? ' first' : ''}">
          <div class="row-num">${row}</div>
          ${left.map(c => seatBtn(row, c)).join('')}
          <div class="aisle"></div>
          ${right.map(c => seatBtn(row, c)).join('')}
        </div>`;
      }

      document.getElementById('tab-content').innerHTML = `
        <div class="grid-2" style="grid-template-columns:1fr 1fr;gap:var(--gap-lg)">
          <div class="seatmap-wrapper">
            <div class="fuselage">
              <div class="cabin">
                <div class="cabin-label">First Class · ${formatCurrency(80)}</div>
                ${FIRST_ROWS.map(r => rowHtml(r, COLS_4, true)).join('')}
              </div>
              <div class="cabin">
                <div class="cabin-label">Business Class · ${formatCurrency(40)}</div>
                ${BUSINESS_ROWS.map(r => rowHtml(r, COLS_6, false)).join('')}
              </div>
              <div class="cabin">
                <div class="cabin-label">Economy Class · ${formatCurrency(15)}</div>
                ${ECONOMY_ROWS.map(r => rowHtml(r, COLS_6, false)).join('')}
              </div>
            </div>
          </div>

          <div class="side-panel">
            <h3 style="margin-bottom:var(--gap-sm)">Choose seats</h3>
            <p class="text-sm" style="color:var(--text-light);margin-bottom:var(--gap-md)">Pick a passenger below, then tap an available seat. Tap a selected seat to clear it.</p>

            <div class="seat-legend">
              <div class="legend-row"><span class="legend-swatch available"></span> Available</div>
              <div class="legend-row"><span class="legend-swatch taken"></span> Taken</div>
              <div class="legend-row"><span class="legend-swatch selected"></span> Your selection</div>
            </div>

            <div class="divider"></div>

            <h4 style="text-transform:uppercase;letter-spacing:0.05em;color:var(--sky-blue-dark);font-size:0.85rem;margin-bottom:var(--gap-sm)">Currently selecting for</h4>

            ${draft.passengers.map((p, i) => `
              <div role="button" class="summary-row pax-pick" data-pax="${i}" style="cursor:${isCancelled ? 'default' : 'pointer'};padding:10px 12px;border-radius:var(--radius-md);background:${i === activeSeatPax ? 'rgba(91,196,232,0.10)' : 'transparent'};border:1.5px solid ${i === activeSeatPax ? 'var(--sky-blue)' : 'transparent'};margin-bottom:6px">
                <span class="label">${escapeHtml(p.firstName) || 'Passenger ' + (i + 1)}</span>
                <span class="value">
                  ${p.seat || '— pick a seat'}
                  ${p.seat ? `<span style="color:var(--sky-blue-dark);margin-left:8px">${formatCurrency(seatPrice(p.seat))}</span>` : ''}
                </span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.querySelectorAll('.pax-pick').forEach(el => {
        el.addEventListener('click', () => { if (isCancelled) return; activeSeatPax = parseInt(el.dataset.pax, 10); renderSeats(); renderSidebar(); });
      });
      document.querySelectorAll('.seat[data-seat]').forEach(b => {
        b.addEventListener('click', () => {
          if (isCancelled) return;
          const id = b.dataset.seat;
          if (taken.has(id) && !originalSeats.has(id)) return;
          if (ownSeats.has(id)) {
            const idx = draft.passengers.findIndex(p => p.seat === id);
            if (idx >= 0) draft.passengers[idx].seat = null;
          } else {
            draft.passengers[activeSeatPax].seat = id;
          }
          renderSeats();
          renderSidebar();
        });
      });
    }

    // ── Tab: Add-ons ──────────────────────────────────────────
    function renderAddons() {
      const cols = Math.min(draft.passengers.length, 3);
      const cats = ['meal', 'drink', 'baggage'];
      const optsFor = c => FDA.services.filter(s => s.category === c);

      document.getElementById('tab-content').innerHTML = `
        <div class="grid-${cols}" style="margin-bottom:var(--gap-lg)">
          ${draft.passengers.map((p, i) => `
            <div class="passenger-card">
              <h4>${escapeHtml(p.firstName) || 'Passenger ' + (i + 1)}${p.seat ? ` <span style="color:var(--text-light)">· seat ${p.seat}</span>` : ''}</h4>
              ${cats.map(c => `
                <div class="form-group">
                  <label class="form-label">${c.charAt(0).toUpperCase() + c.slice(1)}</label>
                  <select class="form-control" data-pax="${i}" data-cat="${c}" ${isCancelled ? 'disabled' : ''}>
                    <option value="">— None —</option>
                    ${optsFor(c).map(s => `<option value="${s.id}" ${draft.services?.[i]?.[c] === s.id ? 'selected' : ''}>${s.icon} ${s.name} · ${formatCurrency(s.price)}</option>`).join('')}
                  </select>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>

        <div class="card"><div class="card-body">
          <h3>Trip extras</h3>
          <p class="text-sm" style="color:var(--text-light);margin-bottom:var(--gap-md)">Apply to all passengers on this booking.</p>
          ${FDA.tripExtras.map(e => `
            <label class="qty-row" style="grid-template-columns:24px 1fr 100px;cursor:${isCancelled ? 'default' : 'pointer'}">
              <input type="checkbox" data-extra="${e.id}" ${draft.extras[e.id] ? 'checked' : ''} ${isCancelled ? 'disabled' : ''} />
              <div class="item">
                <span class="item-icon">${e.icon}</span>
                <div>
                  <div class="item-name">${e.name}</div>
                  <div class="item-desc">${e.desc}</div>
                </div>
              </div>
              <div class="price">${formatCurrency(e.price)} × ${draft.passengers.length}</div>
            </label>
          `).join('')}
        </div></div>
      `;

      document.querySelectorAll('[data-cat]').forEach(sel => {
        sel.addEventListener('change', () => {
          const i = sel.dataset.pax, c = sel.dataset.cat;
          draft.services[i] = draft.services[i] || {};
          draft.services[i][c] = sel.value;
          renderSidebar();
        });
      });
      document.querySelectorAll('[data-extra]').forEach(cb => {
        cb.addEventListener('change', () => {
          draft.extras[cb.dataset.extra] = cb.checked;
          renderSidebar();
        });
      });
    }

    // ── Tab: Change Flight ────────────────────────────────────
    function renderFlightChange() {
      const current = getFlight();
      const alternates = FDA.flights.filter(f => f.from === current.from && f.to === current.to && f.id !== current.id);

      document.getElementById('tab-content').innerHTML = `
        <div class="card"><div class="card-body">
          <h3>Change your flight</h3>
          <p class="text-sm" style="color:var(--text-light);margin-bottom:var(--gap-md)">Pick an alternate flight on the same route. Fare differences are charged or refunded automatically. Changing flight will reset your seat selection.</p>

          <div class="alert alert-info"><div>
            <strong>Currently booked:</strong> ${current.id} · ${current.depart} → ${current.arrive} · ${formatDateShort(current.date)} · ${formatCurrency(current.price)}
          </div></div>

          ${alternates.length === 0 ? `
            <p class="text-center" style="padding:var(--gap-lg);color:var(--text-light)">No alternate flights available on this route.</p>
          ` : `
            <div class="flights-list-wrapper" style="margin-top:var(--gap-md)">
              ${alternates.map(f => {
                const diff = (f.price - current.price) * draft.passengers.length;
                return `
                  <div class="flight-row">
                    <div><div class="time">${f.depart}</div><div class="text-xs text-light">${f.from}</div></div>
                    <div><div class="time">${f.arrive}</div><div class="text-xs text-light">${f.to}</div></div>
                    <div>
                      <div class="stops">${(f.stops || 0) === 0 ? 'Direct' : f.stops + ' stop'} · ${f.duration}</div>
                      <div class="text-xs text-light">${f.id} · ${formatDateShort(f.date)}</div>
                    </div>
                    <div class="price">
                      ${formatCurrency(f.price)}
                      ${diff !== 0 ? `<div class="text-xs" style="color:${diff > 0 ? 'var(--danger)' : 'var(--success)'};margin-top:2px">${diff > 0 ? '+' : ''}${formatCurrency(diff)} total</div>` : ''}
                    </div>
                    <button class="btn btn-primary btn-sm switch-flight-btn" data-id="${f.id}" ${isCancelled ? 'disabled' : ''}>Switch</button>
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div></div>
      `;

      document.querySelectorAll('.switch-flight-btn').forEach(b => {
        b.addEventListener('click', () => {
          if (isCancelled) return;
          draft.flightId = b.dataset.id;
          draft.passengers.forEach(p => p.seat = null);
          showToast('Flight changed — please reselect seats', 'info');
          tab = 'seats';
          renderAll();
        });
      });
    }

    // ── Modals ────────────────────────────────────────────────
    function openSaveModal(diff, newTotal) {
      let bodyHtml;
      if (diff > 0)      bodyHtml = `You'll be charged an additional <strong>${formatCurrency(diff)}</strong>. The new booking total is <strong>${formatCurrency(newTotal)}</strong>.`;
      else if (diff < 0) bodyHtml = `You'll receive a refund of <strong>${formatCurrency(Math.abs(diff))}</strong>. The new booking total is <strong>${formatCurrency(newTotal)}</strong>.`;
      else               bodyHtml = `No price change. We'll just update your booking details.`;
      const confirmLabel = diff > 0 ? 'Pay & save' : diff < 0 ? 'Refund & save' : 'Save changes';

      const overlay = createElement('div', 'modal-overlay');
      overlay.innerHTML = `
        <div class="modal">
          <h3>Save changes to ${reservation.id}?</h3>
          <div class="body">${bodyHtml}</div>
          <div class="actions">
            <button class="btn btn-secondary" id="back-btn">Back</button>
            <button class="btn btn-primary" id="ok-btn">${confirmLabel}</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelector('#back-btn').addEventListener('click', close);
      overlay.querySelector('#ok-btn').addEventListener('click', () => { saveDraft(); close(); });
    }

    function openCancelModal() {
      const overlay = createElement('div', 'modal-overlay');
      overlay.innerHTML = `
        <div class="modal">
          <h3>Cancel booking ${reservation.id}?</h3>
          <div class="body">You'll receive a refund of <strong>${formatCurrency(reservation.total)}</strong> (subject to fare conditions). This can't be undone in the MVP.</div>
          <div class="actions">
            <button class="btn btn-secondary" id="back-btn">Back</button>
            <button class="btn btn-primary" style="background:var(--danger)" id="ok-btn">Cancel booking</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelector('#back-btn').addEventListener('click', close);
      overlay.querySelector('#ok-btn').addEventListener('click', () => {
        cancelReservation(reservation.id);
        showToast(`Booking ${reservation.id} cancelled`, 'success');
        close();
        setTimeout(() => window.location.href = 'reservations.html', 500);
      });
    }

    function saveDraft() {
      const flight = getFlight();
      const c = calcTotal();
      const patch = {
        flight: flight.id,
        from: flight.from, fromCity: flight.fromCity,
        to:   flight.to,   toCity:   flight.toCity,
        date: flight.date, depart: flight.depart, arrive: flight.arrive,
        tripType: draft.tripType,
        contactEmail: draft.contactEmail,
        contactPhone: draft.contactPhone,
        passengers: draft.passengers.map(p => ({ ...p, name: joinName(p.title, p.firstName, p.lastName) })),
        services: draft.services,
        extras: draft.extras,
        total: c.total,
      };
      updateReservation(reservation.id, patch);
      showToast(`Booking ${reservation.id} updated`, 'success');
      setTimeout(() => window.location.href = 'reservations.html', 500);
    }

    // ── Render router ─────────────────────────────────────────
    function renderTabContent() {
      if (tab === 'overview')   return renderOverview();
      if (tab === 'passengers') return renderPassengers();
      if (tab === 'seats')      return renderSeats();
      if (tab === 'addons')     return renderAddons();
      if (tab === 'flight')     return renderFlightChange();
    }

    function renderAll() {
      renderHeader();
      renderTabs();
      renderTabContent();
      renderSidebar();
    }

    if (reservation) renderAll();
  </script>
</body>
</html>
