<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FlyDreamAir</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="app-main">
    <section class="section" style="min-height:calc(100vh - var(--nav-height));display:flex;align-items:center;">
      <div class="container" style="max-width:900px">

        <div style="text-align:center;margin-bottom:var(--gap-xl)">
          <h2>Welcome to FlyDreamAir</h2>
          <div class="divider-teal" style="margin:var(--gap-sm) auto"></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 2px 1fr;gap:var(--gap-xl);align-items:start">

          <!-- Login -->
          <div class="card">
            <div class="card-header"><h3>Login</h3></div>
            <div class="card-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">First Name</label>
                  <input class="form-control" type="text" id="login-first" placeholder="First name" />
                </div>
                <div class="form-group">
                  <label class="form-label">Last Name</label>
                  <input class="form-control" type="text" id="login-last" placeholder="Last name" />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" id="login-email" placeholder="Enter your email" />
              </div>
              <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" id="login-password" placeholder="Enter your password" />
              </div>
              <button class="btn btn-primary btn-full btn-lg mt-md" id="login-btn">Login</button>
              <p class="text-center text-sm mt-md" style="color:var(--text-light)">
                <a href="#" style="color:var(--sky-blue-dark)">Forgot your password?</a>
              </p>
            </div>
          </div>

          <!-- Divider -->
          <div style="background:var(--grey-light);height:100%;min-height:300px;border-radius:2px"></div>

          <!-- Sign Up -->
          <div class="card">
            <div class="card-header"><h3>Sign Up</h3></div>
            <div class="card-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">First Name</label>
                  <input class="form-control" type="text" id="reg-first" placeholder="First name" />
                </div>
                <div class="form-group">
                  <label class="form-label">Last Name</label>
                  <input class="form-control" type="text" id="reg-last" placeholder="Last name" />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input class="form-control" type="email" id="reg-email" placeholder="Email address" />
                </div>
                <div class="form-group">
                  <label class="form-label">Phone Number</label>
                  <input class="form-control" type="tel" id="reg-phone" placeholder="Phone number" />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Date of Birth</label>
                  <input class="form-control" type="date" id="reg-dob" />
                </div>
                <div class="form-group">
                  <label class="form-label">Address</label>
                  <input class="form-control" type="text" id="reg-address" placeholder="Home address" />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Password</label>
                  <input class="form-control" type="password" id="reg-password" placeholder="Create password" />
                </div>
                <div class="form-group">
                  <label class="form-label">Confirm Password</label>
                  <input class="form-control" type="password" id="reg-confirm" placeholder="Confirm password" />
                </div>
              </div>
              <button class="btn btn-teal btn-full btn-lg mt-md" id="signup-btn">Sign Up</button>
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="main.js"></script>
  <script>
    mountChrome('');

    document.getElementById('login-btn').addEventListener('click', () => {
      const first = document.getElementById('login-first').value.trim();
      const last  = document.getElementById('login-last').value.trim();
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value.trim();
      if (!first || !last)       return showToast('Please enter your first and last name', 'warning');
      if (!validateEmail(email)) return showToast('Please enter a valid email address', 'warning');
      if (!pass)                 return showToast('Please enter your password', 'warning');
      const name = first + ' ' + last;
      setUser({ name, firstName: first, lastName: last, email });
      showToast('Welcome back, ' + first + '!', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);
    });

    document.getElementById('signup-btn').addEventListener('click', () => {
      const first   = document.getElementById('reg-first').value.trim();
      const last    = document.getElementById('reg-last').value.trim();
      const email   = document.getElementById('reg-email').value.trim();
      const pass    = document.getElementById('reg-password').value.trim();
      const confirm = document.getElementById('reg-confirm').value.trim();

      if (!first || !last)        return showToast('Please enter your name', 'warning');
      if (!validateEmail(email))  return showToast('Please enter a valid email address', 'warning');
      if (pass.length < 6)        return showToast('Password must be at least 6 characters', 'warning');
      if (pass !== confirm)       return showToast('Passwords do not match', 'warning');

      setUser({ name: first + ' ' + last });
      showToast('Account created — welcome to FlyDreamAir, ' + first + '!', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);
    });
  </script>
</body>
</html>
