<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flights — FlyDreamAir</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="app-main">
    <header class="page-header">
      <div class="container">
        <h1 id="route-heading">Available Flights</h1>
        <p id="route-summary"></p>
      </div>
    </header>

    <section class="section-sm">
      <div class="container">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--gap-md);flex-wrap:wrap;gap:var(--gap-sm)">
          <span style="font-family:var(--font-display);font-size:0.85rem;font-weight:600;color:var(--sky-blue-dark);text-transform:uppercase;letter-spacing:0.05em" id="leg-label">DEPARTURE FLIGHT ✈</span>
          <button class="btn btn-secondary btn-sm" id="edit-toggle">Edit Flight ✎</button>
        </div>

        <div class="card mb-md hidden" id="edit-card">
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">From</label>
                <select class="form-control" id="edit-from"></select>
              </div>
              <div class="form-group">
                <label class="form-label">To</label>
                <select class="form-control" id="edit-to"></select>
              </div>
              <div class="form-group">
                <label class="form-label">Cabin Class</label>
                <select class="form-control" id="edit-cabin">
                  <option value="Economy">Economy</option>
                  <option value="Business">Business</option>
                  <option value="First">First</option>
                </select>
              </div>
              <div class="form-group" style="align-self:flex-end">
                <button class="btn btn-primary" id="apply-edit">Apply</button>
              </div>
            </div>
          </div>
        </div>

        <div class="date-chips" id="date-chips"></div>

        <div class="filter-bar">
          <div class="filter-group">
            <label>Stops</label>
            <select class="form-control" id="filter-stops">
              <option value="any">Any</option>
              <option value="0">Direct only</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Max price <span id="max-price-label">$2,000</span></label>
            <input type="range" min="100" max="2000" step="50" value="2000" id="filter-price" />
          </div>
          <div class="filter-group">
            <label>Departure time</label>
            <select class="form-control" id="filter-time">
              <option value="any">Any time</option>
              <option value="early">Early (00–06)</option>
              <option value="morning">Morning (06–12)</option>
              <option value="afternoon">Afternoon (12–18)</option>
              <option value="evening">Evening (18–24)</option>
            </select>
          </div>
          <div class="filter-group" style="margin-left:auto">
            <label>Sort by</label>
            <select class="form-control" id="filter-sort">
              <option value="price-asc">Price (low–high)</option>
              <option value="price-desc">Price (high–low)</option>
              <option value="depart-asc">Departure time</option>
              <option value="duration-asc">Duration</option>
            </select>
          </div>
        </div>

        <div id="flights-list"></div>

      </div>
    </section>
  </main>

  <div id="footer-mount"></div>
  <script src="main.js"></script>
  <script>
    mountChrome('search');
    const booking = loadBooking();
    let params = booking.searchParams || { from:'SYD', to:'MEL', departDate:'2026-06-01', passengers:1, cabin:'Economy', tripType:'return' };

    const pickingReturn = booking.selectedFlight && !booking.returnFlight && params.tripType === 'return';
    const legFrom = pickingReturn ? params.to   : params.from;
    const legTo   = pickingReturn ? params.from : params.to;

    document.getElementById('leg-label').textContent     = pickingReturn ? 'RETURN FLIGHT ✈' : 'DEPARTURE FLIGHT ✈';
    document.getElementById('route-heading').textContent = legFrom + ' → ' + legTo;
    document.getElementById('route-summary').textContent =
      formatDate(pickingReturn ? params.returnDate : params.departDate) + ' · ' + params.passengers + ' passenger(s) · ' + (params.cabin||'Economy');

    const editFrom  = document.getElementById('edit-from');
    const editTo    = document.getElementById('edit-to');
    const editCabin = document.getElementById('edit-cabin');
    FDA.airports.forEach(a => {
      const o = `<option value="${a.code}">${a.code} — ${a.city}</option>`;
      editFrom.insertAdjacentHTML('beforeend', o);
      editTo.insertAdjacentHTML('beforeend', o);
    });
    editFrom.value  = legFrom;
    editTo.value    = legTo;
    editCabin.value = params.cabin || 'Economy';

    let currentFrom  = legFrom, currentTo = legTo;

    document.getElementById('edit-toggle').addEventListener('click', () => {
      document.getElementById('edit-card').classList.toggle('hidden');
    });

    document.getElementById('apply-edit').addEventListener('click', () => {
      if (editFrom.value === editTo.value) return showToast('Origin and destination must be different','warning');
      currentFrom = editFrom.value;
      currentTo   = editTo.value;
      params.cabin = editCabin.value;
      saveBooking({ searchParams: { ...params, cabin: editCabin.value } });
      document.getElementById('route-heading').textContent = currentFrom + ' → ' + currentTo;
      renderChips(); render();
      showToast('Search updated','info');
      document.getElementById('edit-card').classList.add('hidden');
    });

    // For same-day return flights, filter out flights that depart before outbound arrives
    const outboundArriveTime = pickingReturn && booking.selectedFlight
      ? booking.selectedFlight.arrive.replace('+1','').trim()
      : null;

    const DATE_STRIP = ['2026-05-30','2026-05-31','2026-06-01','2026-06-02','2026-06-03'];
    // Make sure activeDate is always in the strip — fall back to first strip date if not
    let rawDate  = (pickingReturn ? params.returnDate : params.departDate) || '2026-06-01';
    let activeDate = DATE_STRIP.includes(rawDate) ? rawDate : DATE_STRIP[2];

    function renderChips() {
      const matching = FDA.flights.filter(f => f.from === currentFrom && f.to === currentTo);
      document.getElementById('date-chips').innerHTML = DATE_STRIP.map(d => {
        const onDay = matching.filter(f => f.date === d);
        const cheap = onDay.length ? Math.min(...onDay.map(f => f.price)) : null;
        const c = formatChip(d);
        return `<div class="date-chip ${d===activeDate?'active':''}" data-date="${d}" role="button">
          <span class="day">${c.day} ${c.dm}</span>
          <span class="price">${cheap ? formatCurrency(cheap) : '—'}</span>
        </div>`;
      }).join('');
      document.querySelectorAll('.date-chip').forEach(c => {
        c.addEventListener('click', () => { activeDate = c.dataset.date; renderChips(); render(); });
      });
    }

    function parseDuration(str) {
      const m = (str||'').match(/(\d+)h\s*(\d+)?/);
      return m ? parseInt(m[1],10)*60 + parseInt(m[2]||'0',10) : 0;
    }

    function render() {
      const stops    = document.getElementById('filter-stops').value;
      const maxPrice = parseInt(document.getElementById('filter-price').value,10);
      const tBucket  = document.getElementById('filter-time').value;
      const sort     = document.getElementById('filter-sort').value;
      document.getElementById('max-price-label').textContent = formatCurrency(maxPrice);

      let list = FDA.flights.filter(f => {
        if (f.from !== currentFrom) return false;
        if (f.to   !== currentTo)   return false;
        if (f.date !== activeDate)  return false;
        if (stops !== 'any' && String(f.stops||0) !== stops) return false;
        if (f.price > maxPrice) return false;
        if (tBucket !== 'any' && timeBucket(f.depart) !== tBucket) return false;
        // For same-day return, hide flights that depart before or at the same time the outbound arrives
        if (outboundArriveTime && activeDate === params.departDate) {
          if (f.depart <= outboundArriveTime) return false;
        }
        return true;
      });

      list.sort((a,b) => {
        if (sort==='price-desc')   return b.price - a.price;
        if (sort==='depart-asc')   return a.depart.localeCompare(b.depart);
        if (sort==='duration-asc') return parseDuration(a.duration) - parseDuration(b.duration);
        return a.price - b.price;
      });

      const listEl = document.getElementById('flights-list');
      if (!list.length) {
        listEl.innerHTML = `<div class="text-center" style="padding:var(--gap-xxl) 0">
          <div style="font-size:3rem">🛬</div>
          <h3 style="margin-top:var(--gap-md)">No flights found</h3>
          <p>Try adjusting the filters or searching a different route.</p>
        </div>`;
        return;
      }

      listEl.innerHTML = list.map(f => `
        <div class="flight-row animate-fade-up">
          <div><div class="time">${f.depart}</div><div class="text-xs text-light">${f.fromCity}</div></div>
          <div><div class="time">${f.arrive}</div><div class="text-xs text-light">${f.toCity}</div></div>
          <div>
            <div class="stops">${(f.stops||0)===0?'✈️ Direct':f.stops+' stop'} · ${f.duration}</div>
            <div class="text-xs text-light">${f.id} · ${f.seats} seats left</div>
          </div>
          <div class="price">${formatCurrency(f.price)}</div>
          <button class="btn btn-primary btn-sm" data-id="${f.id}">Select</button>
        </div>
      `).join('');

      listEl.querySelectorAll('button[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          const flight = getFlightById(btn.dataset.id);
          if (pickingReturn) {
            saveBooking({ returnFlight: flight });
            showToast('Return flight selected!', 'success');
            setTimeout(() => window.location.href = 'seats.html', 400);
          } else {
            saveBooking({ selectedFlight: flight, returnFlight: null });
            showToast('Outbound flight selected!', 'success');
            setTimeout(() => {
              window.location.href = params.tripType === 'return' ? 'search.html' : 'seats.html';
            }, 400);
          }
        });
      });
    }

    ['filter-stops','filter-time','filter-sort'].forEach(id =>
      document.getElementById(id).addEventListener('change', render)
    );
    document.getElementById('filter-price').addEventListener('input', render);
    renderChips();
    render();
  </script>
</body>
</html>
